<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }
      #box {
        position: absolute;
        top: 490px;
        left: 0;
        width: 100px;
        height: 100px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <!--
      Minimal reproduction: GSAP/DOM motion renders at 30fps even with `--fps 60`.

      #box moves LINEARLY (ease: "none") across the 1920px width over 4s (240 frames @60fps).
        - Expected at 60fps: the box advances ~7.6px EVERY frame -> 240 distinct frames.
        - Actual at `--fps 60`: the box advances only every OTHER frame (~15.2px every 2nd
          frame), and the in-between frame is an exact duplicate -> 30fps motion in a 60fps
          container. (`--fps 30` renders perfectly — see README.)

      `left` (a layout property) is animated rather than `x`/transform purely so the cadence
      reads cleanly in per-frame analysis; the bug affects all properties and all eases.
    -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4"
      data-width="1920"
      data-height="1080"
    >
      <div id="box"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.to("#box", { left: 1820, duration: 4, ease: "none" }, 0);
      window.__timelines["main"] = tl;

      /* ---------- 60fps render workaround (do NOT ship; demonstrates the fix) ----------
         The runtime re-quantizes every render seek to canonicalFps=30. After the original
         hf.seek(t) runs, re-seek the GSAP master to the EXACT t so DOM motion lands on the
         60fps grid. No-op in the Studio preview (which never calls renderSeek). */
      (function enableExact60fpsRenderSeek() {
        function wrapSeek(fn) {
          if (typeof fn !== "function" || fn.__hfExact60) return fn;
          var wrapped = function (t) {
            var r = fn.apply(this, arguments);
            var master = window.__timelines && window.__timelines["main"];
            if (master) { try { master.pause(); master.time(Math.max(0, Number(t) || 0), false); } catch (e) {} }
            return r;
          };
          wrapped.__hfExact60 = true;
          return wrapped;
        }
        function trapHf(obj) {
          if (!obj || obj.__hfExact60Trapped) return;
          obj.__hfExact60Trapped = true;
          var stored = wrapSeek(obj.seek);
          Object.defineProperty(obj, "seek", {
            configurable: true, enumerable: true,
            get: function () { return stored; },
            set: function (fn) { stored = wrapSeek(fn); },
          });
        }
        var held = window.__hf;
        if (held) trapHf(held);
        try {
          Object.defineProperty(window, "__hf", {
            configurable: true, enumerable: true,
            get: function () { return held; },
            set: function (v) { held = v; trapHf(v); },
          });
        } catch (e) {}
      })();
    </script>
  </body>
</html>
